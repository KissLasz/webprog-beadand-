<!doctype html>
<html lang="hu">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Axios</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        nav {
            background: #333;
            padding: 10px;
        }

        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
        }

        button {
            padding: 10px;
            margin-right: 6px;
        }

        input[type="text"] {
            padding: 8px;
            width: 250px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #000;
            padding: 8px;
        }
    </style>
</head>

<body>

    <nav>
        <a href="/webprog-beadand-/index.html">Home</a>
        <a href="/webprog-beadand-/apps/javascript.html">JavaScript</a>
        <a href="/webprog-beadand-/apps/react.html">React</a>
        <a href="/webprog-beadand-/apps/spa.html">SPA</a>
        <a href="/webprog-beadand-/apps/fetchapi.html">Fetch</a>
        <a href="/webprog-beadand-/apps/axios.html">Axios</a>
        <a href="/webprog-beadand-/apps/oojs.html">OOJS</a>
    </nav>

    <div class="container">

        <h1>Axios CRUD alkalmazás</h1>

        <h2>Új / módosítás</h2>

        <input type="hidden" id="id">

        <div style="margin-bottom:10px;">
            <input type="text" id="nev" placeholder="Név">
        </div>

        <div style="margin-bottom:10px;">
            <input type="text" id="tipus" placeholder="Típus">
        </div>

        <div style="margin-bottom:10px;">
            <label>
                <input type="checkbox" id="dijazott"> Díjazott
            </label>
        </div>

        <div style="margin-bottom:15px;">
            <button onclick="saveSuti()">Mentés</button>
            <button onclick="resetForm()">Mégse</button>
            <button onclick="loadData()">Adatok betöltése</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Név</th>
                    <th>Típus</th>
                    <th>Díjazott</th>
                    <th>Művelet</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        const API_BASE = "/webprog-beadand-/api";

        function loadData() {
            axios.get(API_BASE + "/suti_read.php")
                .then(function (response) {
                    console.log(response.data);

                    var data = response.data;
                    var tbody = document.getElementById("tableBody");

                    tbody.innerHTML = "";

                    data.forEach(function (item) {
                        var row = "<tr>";
                        row += "<td>" + item.id + "</td>";
                        row += "<td>" + item.nev + "</td>";
                        row += "<td>" + (item.tipus ? item.tipus : "") + "</td>";
                        row += "<td>" + (Number(item.dijazott) === 1 ? "Igen" : "Nem") + "</td>";
                        row += "<td>";
                        row += "<button onclick='editSuti(" + item.id + ")'>Módosítás</button>";
                        row += "<button onclick='deleteSuti(" + item.id + ")'>Törlés</button>";
                        row += "</td>";
                        row += "</tr>";

                        tbody.innerHTML += row;
                    });
                })
                .catch(function (error) {
                    console.log(error);
                    alert("Hiba a betöltésnél.");
                });
        }

        function saveSuti() {
            var id = document.getElementById("id").value;
            var nev = document.getElementById("nev").value.trim();
            var tipus = document.getElementById("tipus").value.trim();
            var dijazott = document.getElementById("dijazott").checked ? 1 : 0;

            if (nev === "") {
                alert("A név megadása kötelező.");
                return;
            }

            var data = {
                id: id,
                nev: nev,
                tipus: tipus,
                dijazott: dijazott
            };

            if (id === "") {
                axios.post(API_BASE + "/suti_create.php", data)
                    .then(function (response) {
                        console.log(response.data);
                        resetForm();
                        loadData();
                    })
                    .catch(function (error) {
                        console.log(error);
                        alert("Hiba a létrehozásnál.");
                    });
            } else {
                axios.post(API_BASE + "/suti_update.php", data)
                    .then(function (response) {
                        console.log(response.data);
                        resetForm();
                        loadData();
                    })
                    .catch(function (error) {
                        console.log(error);
                        alert("Hiba a módosításnál.");
                    });
            }
        }

        function editSuti(id) {
            axios.get(API_BASE + "/suti_read.php")
                .then(function (response) {
                    var data = response.data;
                    var selected = data.find(function (item) {
                        return Number(item.id) === Number(id);
                    });

                    if (!selected) {
                        alert("Nem található a kiválasztott elem.");
                        return;
                    }

                    document.getElementById("id").value = selected.id;
                    document.getElementById("nev").value = selected.nev;
                    document.getElementById("tipus").value = selected.tipus ? selected.tipus : "";
                    document.getElementById("dijazott").checked = Number(selected.dijazott) === 1;
                })
                .catch(function (error) {
                    console.log(error);
                    alert("Hiba a szerkesztés előkészítésénél.");
                });
        }

        function deleteSuti(id) {
            if (!confirm("Biztosan törlöd ezt a sütit?")) {
                return;
            }

            axios.post(API_BASE + "/suti_delete.php", { id: id })
                .then(function (response) {
                    console.log(response.data);
                    loadData();
                })
                .catch(function (error) {
                    console.log(error);
                    alert("Hiba a törlésnél.");
                });
        }

        function resetForm() {
            document.getElementById("id").value = "";
            document.getElementById("nev").value = "";
            document.getElementById("tipus").value = "";
            document.getElementById("dijazott").checked = false;
        }

        window.onload = loadData;
    </script>

</body>

</html>
