<!doctype html>
<html lang="hu">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Axios CRUD - Sütemények</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/apps/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Menü</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/apps/javascript.html">JavaScript</a></li>
                    <li class="nav-item"><a class="nav-link" href="/apps/react-app/index.html">React</a></li>
                    <li class="nav-item"><a class="nav-link" href="/apps/spa.html">SPA</a></li>
                    <li class="nav-item"><a class="nav-link" href="/apps/fetchapi.html">Fetch API</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/apps/axios.html">Axios</a></li>
                    <li class="nav-item"><a class="nav-link" href="/apps/oojs.html">OOJS</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4">Axios CRUD alkalmazás – Sütemények</h1>

        <div class="card p-4 shadow-sm mb-4">
            <input type="hidden" id="id">

            <div class="mb-3">
                <input type="text" class="form-control" id="nev" placeholder="Név">
            </div>

            <div class="mb-3">
                <input type="text" class="form-control" id="tipus" placeholder="Típus">
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="dijazott">
                <label class="form-check-label" for="dijazott">Díjazott</label>
            </div>

            <div>
                <button class="btn btn-dark" onclick="saveSuti()">Mentés</button>
                <button class="btn btn-secondary" onclick="resetForm()">Mégse</button>
                <button class="btn btn-primary" onclick="loadData()">Adatok betöltése</button>
            </div>
        </div>

        <div class="card p-4 shadow-sm">
            <table class="table table-bordered table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Név</th>
                        <th>Típus</th>
                        <th>Díjazott</th>
                        <th>Művelet</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const API_BASE = "/api";

        function loadData() {
            axios.get(API_BASE + "/suti_read.php")
                .then(function (response) {
                    const data = response.data;
                    const tbody = document.getElementById("tableBody");
                    tbody.innerHTML = "";

                    data.forEach(function (item) {
                        let row = "<tr>";
                        row += "<td>" + item.id + "</td>";
                        row += "<td>" + item.nev + "</td>";
                        row += "<td>" + (item.tipus ? item.tipus : "") + "</td>";
                        row += "<td>" + (Number(item.dijazott) === 1 ? "Igen" : "Nem") + "</td>";
                        row += "<td>";
                        row += "<button class='btn btn-sm btn-warning me-1' onclick='editSuti(" + item.id + ")'>Módosítás</button>";
                        row += "<button class='btn btn-sm btn-danger' onclick='deleteSuti(" + item.id + ")'>Törlés</button>";
                        row += "</td>";
                        row += "</tr>";
                        tbody.innerHTML += row;
                    });
                })
                .catch(function (error) {
                    console.log(error);
                    alert("Hiba a betöltésnél.");
                });
        }

        function saveSuti() {
            const id = document.getElementById("id").value;
            const nev = document.getElementById("nev").value.trim();
            const tipus = document.getElementById("tipus").value.trim();
            const dijazott = document.getElementById("dijazott").checked ? 1 : 0;

            if (nev === "") {
                alert("A név megadása kötelező.");
                return;
            }

            const data = { id, nev, tipus, dijazott };

            if (id === "") {
                axios.post(API_BASE + "/suti_create.php", data)
                    .then(function () {
                        resetForm();
                        loadData();
                    })
                    .catch(function (error) {
                        console.log(error);
                        alert("Hiba a létrehozásnál.");
                    });
            } else {
                axios.post(API_BASE + "/suti_update.php", data)
                    .then(function () {
                        resetForm();
                        loadData();
                    })
                    .catch(function (error) {
                        console.log(error);
                        alert("Hiba a módosításnál.");
                    });
            }
        }

        function editSuti(id) {
            axios.get(API_BASE + "/suti_read.php")
                .then(function (response) {
                    const data = response.data;
                    const selected = data.find(function (item) {
                        return Number(item.id) === Number(id);
                    });

                    if (!selected) {
                        alert("Nem található a kiválasztott elem.");
                        return;
                    }

                    document.getElementById("id").value = selected.id;
                    document.getElementById("nev").value = selected.nev;
                    document.getElementById("tipus").value = selected.tipus ? selected.tipus : "";
                    document.getElementById("dijazott").checked = Number(selected.dijazott) === 1;
                })
                .catch(function (error) {
                    console.log(error);
                    alert("Hiba a szerkesztés előkészítésénél.");
                });
        }

        function deleteSuti(id) {
            if (!confirm("Biztosan törlöd ezt a sütit?")) return;

            axios.post(API_BASE + "/suti_delete.php", { id: id })
                .then(function () {
                    loadData();
                })
                .catch(function (error) {
                    console.log(error);
                    alert("Hiba a törlésnél.");
                });
        }

        function resetForm() {
            document.getElementById("id").value = "";
            document.getElementById("nev").value = "";
            document.getElementById("tipus").value = "";
            document.getElementById("dijazott").checked = false;
        }

        window.onload = loadData;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
