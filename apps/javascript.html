<!doctype html>
<html lang="hu">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JavaScript CRUD - Sütemények</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Menü</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="javascript.html">JavaScript</a></li>
                    <li class="nav-item"><a class="nav-link" href="react.html">React</a></li>
                    <li class="nav-item"><a class="nav-link" href="spa.html">SPA</a></li>
                    <li class="nav-item"><a class="nav-link" href="fetchapi.html">Fetch API</a></li>
                    <li class="nav-item"><a class="nav-link" href="axios.html">Axios</a></li>
                    <li class="nav-item"><a class="nav-link" href="oojs.html">OOJS</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTENT -->
    <div class="container mt-4">
        <h1 class="mb-4">JavaScript CRUD alkalmazás – Sütemények</h1>

        <!-- FORM -->
        <div class="card p-4 shadow-sm mb-4">
            <form onsubmit="event.preventDefault(); onFormSubmit();">

                <div class="mb-3">
                    <label for="nev" class="form-label">Sütemény neve *</label>
                    <label class="validation-error hide" id="nevValidationError">Ez a mező kötelező.</label>
                    <input type="text" class="form-control" id="nev">
                </div>

                <div class="mb-3">
                    <label for="tipus" class="form-label">Típus</label>
                    <input type="text" class="form-control" id="tipus">
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="dijazott">
                    <label class="form-check-label" for="dijazott">Díjazott</label>
                </div>

                <div class="form-action-buttons">
                    <input type="submit" value="Mentés" class="btn btn-dark">
                </div>

            </form>
        </div>

        <!-- TABLE -->
        <div class="card p-4 shadow-sm">
            <table class="table table-bordered table-striped list" id="sutiList">
                <thead>
                    <tr>
                        <th>Név</th>
                        <th>Típus</th>
                        <th>Díjazott</th>
                        <th>Műveletek</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
