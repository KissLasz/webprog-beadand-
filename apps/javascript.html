<!doctype html>
<html lang="hu">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JavaScript CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Menü</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="javascript.html">JavaScript</a></li>
                    <li class="nav-item"><a class="nav-link" href="react.html">React</a></li>
                    <li class="nav-item"><a class="nav-link" href="spa.html">SPA</a></li>
                    <li class="nav-item"><a class="nav-link" href="fetchapi.html">Fetch API</a></li>
                    <li class="nav-item"><a class="nav-link" href="axios.html">Axios</a></li>
                    <li class="nav-item"><a class="nav-link" href="oojs.html">OOJS</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4">JavaScript CRUD alkalmazás</h1>

        <div class="employee-form">
            <form onsubmit="event.preventDefault(); onFormSubmit();">
                <div class="mb-3">
                    <label for="fullName" class="form-label">Teljes név*</label>
                    <label class="validation-error hide" id="fullNameValidationError">Ez a mező kötelező.</label>
                    <input type="text" class="form-control" id="fullName">
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="text" class="form-control" id="email">
                </div>

                <div class="mb-3">
                    <label for="salary" class="form-label">Fizetés</label>
                    <input type="text" class="form-control" id="salary">
                </div>

                <div class="mb-3">
                    <label for="city" class="form-label">Város</label>
                    <input type="text" class="form-control" id="city">
                </div>

                <div class="form-action-buttons">
                    <input type="submit" value="Mentés" class="btn btn-dark">
                </div>
            </form>
        </div>

        <div class="employees-table mt-4">
            <table class="table table-bordered table-striped list" id="employeeList">
                <thead>
                    <tr>
                        <th>Teljes név</th>
                        <th>Email</th>
                        <th>Fizetés</th>
                        <th>Város</th>
                        <th>Műveletek</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
